# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py313"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25

[lint.per-file-ignores]
"tests/*" = [
    "S101",    # Use of assert detected (assert is standard in tests)
    "SLF001",  # Private member accessed (needed for testing internals)
    "ANN001",  # Missing type annotation for function argument
    "ANN201",  # Missing return type annotation for public function
    "D400",    # First line should end with a period
    "D415",    # First line should end with a period, question mark, or exclamation point
    "PLC0415", # import should be at the top-level of a file (hypothesis tests need local imports)
    "PLR2004", # Magic value used in comparison (test values are often literal)
]
